# Cloud Build config for frontend only
# Usage: gcloud builds submit ./frontend --config=frontend/cloudbuild.yaml --region=asia-southeast1 --substitutions=_BACKEND_URL=...,_REGION=asia-southeast1
steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "build-frontend"
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/frontend:latest"
      - --build-arg
      - BACKEND_URL=${_BACKEND_URL}
      - --build-arg
      - NEXT_PUBLIC_API_URL=/api/v1
      - --build-arg
      - NEXT_PUBLIC_USE_MOCK=false
      - .

  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend"
    waitFor: ["build-frontend"]
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/frontend:latest"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/frontend:latest"

timeout: 900s
