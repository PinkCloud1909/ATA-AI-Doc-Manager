# Cloud Build CI/CD pipeline for AI-Doc-Manager
#
# Trigger: push to main branch (configure in Cloud Build Triggers)
# Images are pushed to Artifact Registry with the short commit SHA as the tag.
#
# Required substitutions (set in Cloud Build Trigger or via --substitutions):
#   _REGION             — Artifact Registry / Cloud Run region (e.g. asia-southeast1)
#   _BACKEND_SA         — Backend service account email
#   _BACKEND_URL        — Backend Cloud Run service URL (for frontend API rewrites)
#   _FRONTEND_URL       — (Optional) Frontend URL for CORS

steps:
  # ── Backend ──────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-backend"
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/backend:latest"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/backend:latest"
      - ./backend

  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend"
    waitFor: ["build-backend"]
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/backend:latest"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend-latest"
    waitFor: ["push-backend"]
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/backend:latest"

  # ── Frontend ─────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-frontend"
    waitFor: ["-"]  # Run in parallel with backend
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/frontend:latest"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/frontend:latest"
      - --build-arg
      - "BACKEND_URL=${_BACKEND_URL}"
      - --build-arg
      - NEXT_PUBLIC_API_URL=/api/v1
      - --build-arg
      - NEXT_PUBLIC_USE_MOCK=false
      - ./frontend

  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend"
    waitFor: ["build-frontend"]
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/frontend:latest"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend-latest"
    waitFor: ["push-frontend"]
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/frontend:latest"

  # ── Deploy Backend to Cloud Run ──────────────────────────────────────────
  # NOTE: This pipeline assumes the Cloud Run service has already been created
  # and configured with the required environment variables (ENVIRONMENT, GCP_*,
  # CLOUD_SQL_CONNECTION_NAME, etc.) via the initial deploy in
  # docs/cloud-run-deployment.md.  On first deploy, run that manual setup first;
  # subsequent pushes to main only update the container image.
  #
  # SECRETS: Do NOT use --set-secrets here.  JWT_SECRET_KEY, DB_PASSWORD, and
  # other production secrets are fetched programmatically at startup by
  # secret_provider.py via the Secret Manager SDK (see
  # docs/cloud-run-deployment.md step 7).  Using --set-secrets would cause
  # redundant API calls (Cloud Run's infrastructure + the SDK) and could mask
  # Secret Manager permission issues by silently falling back to env-var
  # defaults that might be stale.
  - name: "gcr.io/cloud-builders/gcloud"
    id: "deploy-backend"
    waitFor: ["push-backend"]
    args:
      - run
      - deploy
      - dms-backend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/backend:latest
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_BACKEND_SA}
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --concurrency=80
      - --max-instances=10
      - --timeout=600s
      - --allow-unauthenticated
      # --add-cloudsql-instances adds (or no-ops if already present), which is
      # safer for incremental deploys than --set-cloudsql-instances (which replaces
      # the full list and could drop an intentionally-added instance).
      - --add-cloudsql-instances=${PROJECT_ID}:${_REGION}:dms-pg
      - --startup-probe=httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=5,timeoutSeconds=3,periodSeconds=10,failureThreshold=3
      - --liveness-probe=httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=10,timeoutSeconds=3,periodSeconds=30,failureThreshold=3
      - --readiness-probe=httpGet.path=/ready,httpGet.port=8080,timeoutSeconds=5,periodSeconds=10,failureThreshold=3

  # ── Deploy Frontend to Cloud Run ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    id: "deploy-frontend"
    waitFor: ["push-frontend"]
    args:
      - run
      - deploy
      - dms-frontend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/frontend:latest
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --max-instances=5
      - --timeout=300s
      - --allow-unauthenticated

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/backend:latest"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/backend:latest"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/frontend:latest"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/dms/frontend:latest"

timeout: 1800s
