services:
  # ── Database migrations (run-once) ────────────────────────────────────
  # Applies pending Alembic migrations and seeds bootstrap IAM data.
  # This mirrors the production pattern where migrations run as a Cloud Run
  # Job or CI/CD step, never as part of the API server startup.
  db-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-doc-migrate
    env_file:
      - .env
      - ./backend/.env
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    command: python scripts/run_migrations.py

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-doc-backend
    env_file:
      - .env
      - ./backend/.env
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/adc.json
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    ports:
      # Host port 8000 → container port 8080 (Dockerfile default PORT=8080).
      - "8000:8080"
    volumes:
      # Mount Application Default Credentials so local dev uses real GCS.
      - ${GOOGLE_APPLICATION_CREDENTIALS:-~/.config/gcloud/application_default_credentials.json}:/gcp/adc.json:ro
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8080
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_USE_MOCK: "false"
    container_name: ai-doc-frontend
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8080
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_USE_MOCK: "false"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:8080"
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    container_name: ai-doc-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
